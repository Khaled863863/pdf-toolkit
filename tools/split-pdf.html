<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Split PDF — Extract Pages Online Free | PDF Toolkit</title>
<meta name="description" content="Split PDF files or extract specific pages online. Free and private — runs in your browser.">
<link rel="stylesheet" href="../css/style.css">
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body>
<main class="tool-page container">
  <a class="back-link" href="../index.html">← All tools</a>
  <div class="tool-header">
    <h1>Split PDF</h1>
    <p>Extract specific page ranges or split every page into its own file.</p>
  </div>

  <div data-ad></div>

  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">✂</div>
    <h2>Drop a PDF here</h2>
    <p>or click to choose a file</p>
    <button class="btn" type="button">Select File</button>
    <input type="file" id="fileInput" accept="application/pdf">
  </div>

  <div class="file-list" id="fileList"></div>

  <div class="options" id="options" style="display:none">
    <div>
      <label>Split mode</label>
      <select id="mode">
        <option value="range">Extract page range (e.g. 2-5)</option>
        <option value="all">One PDF per page (ZIP archive)</option>
      </select>
    </div>
    <div id="rangeRow">
      <label>Page range (e.g. 1-3, 5, 8-10)</label>
      <input type="text" id="range" placeholder="1-3, 5, 8-10">
    </div>
  </div>

  <div class="status" id="status"></div>
  <div class="progress" id="progress"><div class="progress-bar"></div></div>

  <div class="actions">
    <button class="btn btn-success" id="runBtn" disabled>Split &amp; Download</button>
  </div>

  <div data-ad></div>
</main>

<script src="../js/app.js"></script>
<script src="../js/tools/split.js"></script>
</body>
</html>
