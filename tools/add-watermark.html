<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Watermark to PDF | PDF Toolkit</title>
<meta name="description" content="Stamp a text watermark across every page of your PDF. Free online.">
<link rel="stylesheet" href="../css/style.css">
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
<main class="tool-page container">
  <a class="back-link" href="../index.html">← All tools</a>
  <div class="tool-header">
    <h1>Add Watermark</h1>
    <p>Stamp text across every page — good for "DRAFT", "CONFIDENTIAL", or branding.</p>
  </div>

  <div data-ad></div>

  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">©</div>
    <h2>Drop a PDF here</h2>
    <p>or click to select</p>
    <button class="btn" type="button">Select File</button>
    <input type="file" id="fileInput" accept="application/pdf">
  </div>

  <div class="file-list" id="fileList"></div>

  <div class="options" id="options" style="display:none">
    <div>
      <label>Watermark text</label>
      <input type="text" id="text" value="CONFIDENTIAL">
    </div>
    <div class="row">
      <div>
        <label>Font size</label>
        <input type="number" id="size" value="60" min="10" max="200">
      </div>
      <div>
        <label>Opacity (0–1)</label>
        <input type="number" id="opacity" value="0.2" min="0.05" max="1" step="0.05">
      </div>
    </div>
    <div>
      <label>Rotation (degrees)</label>
      <input type="number" id="rot" value="-45" min="-180" max="180">
    </div>
  </div>

  <div class="status" id="status"></div>
  <div class="progress" id="progress"><div class="progress-bar"></div></div>

  <div class="actions">
    <button class="btn btn-success" id="runBtn" disabled>Add Watermark</button>
  </div>

  <div data-ad></div>
</main>

<script src="../js/app.js"></script>
<script>
(function(){
  const zone=document.getElementById('dropZone'),input=document.getElementById('fileInput'),
    list=document.getElementById('fileList'),options=document.getElementById('options'),
    text=document.getElementById('text'),size=document.getElementById('size'),
    op=document.getElementById('opacity'),rot=document.getElementById('rot'),
    runBtn=document.getElementById('runBtn'),status=document.getElementById('status'),
    progress=document.getElementById('progress');
  let file=null;
  setupDropZone(zone,input,inc=>{
    const pdf=inc.find(f=>f.type==='application/pdf'||f.name.toLowerCase().endsWith('.pdf'));
    if(!pdf)return setStatus(status,'Please select a PDF.','error');
    file=pdf;
    list.innerHTML=`<div class="file-item"><span>©</span><span class="name">${pdf.name}</span><span class="size">${formatBytes(pdf.size)}</span></div>`;
    options.style.display='';runBtn.disabled=false;setStatus(status,'Ready.','info');
  });
  runBtn.addEventListener('click',async()=>{
    if(!file)return;
    runBtn.disabled=true;setStatus(status,'Applying watermark…','info');setProgress(progress,20);
    try{
      const {PDFDocument,rgb,degrees,StandardFonts}=PDFLib;
      const bytes=await file.arrayBuffer();
      const doc=await PDFDocument.load(bytes,{ignoreEncryption:true});
      const font=await doc.embedFont(StandardFonts.HelveticaBold);
      const t=text.value||'WATERMARK',fs=+size.value,opacity=+op.value,r=+rot.value;
      doc.getPages().forEach(p=>{
        const {width,height}=p.getSize();
        const tw=font.widthOfTextAtSize(t,fs);
        p.drawText(t,{x:(width-tw)/2,y:height/2,size:fs,font,color:rgb(.6,.6,.6),opacity,rotate:degrees(r)});
      });
      const out=await doc.save();
      setProgress(progress,100);
      download(new Blob([out],{type:'application/pdf'}),file.name.replace(/\.pdf$/i,'')+'_watermarked.pdf');
      setStatus(status,'✓ Done!','success');
    }catch(err){setStatus(status,'Error: '+err.message,'error');}
    finally{runBtn.disabled=false;}
  });
})();
</script>
</body>
</html>
