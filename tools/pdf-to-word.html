<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF to Word — Convert PDF to DOCX | PDF Toolkit</title>
<meta name="description" content="Convert PDF to an editable Word DOCX. Free, private, runs in your browser.">
<link rel="stylesheet" href="../css/style.css">
<script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.min.js"></script>
</head>
<body>
<main class="tool-page container">
  <a class="back-link" href="../index.html">← All tools</a>
  <div class="tool-header">
    <h1>PDF to Word</h1>
    <p>Extracts text from your PDF and packages it into an editable .docx file. For text-based PDFs — scanned documents need OCR.</p>
  </div>

  <div data-ad></div>

  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">W</div>
    <h2>Drop a PDF here</h2>
    <p>or click to select</p>
    <button class="btn" type="button">Select File</button>
    <input type="file" id="fileInput" accept="application/pdf">
  </div>

  <div class="file-list" id="fileList"></div>
  <div class="status" id="status"></div>
  <div class="progress" id="progress"><div class="progress-bar"></div></div>

  <div class="actions">
    <button class="btn btn-success" id="runBtn" disabled>Convert to Word</button>
  </div>

  <div data-ad></div>
</main>

<script src="../js/app.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';</script>
<script>
(function(){
  const zone=document.getElementById('dropZone'),input=document.getElementById('fileInput'),
    list=document.getElementById('fileList'),runBtn=document.getElementById('runBtn'),
    status=document.getElementById('status'),progress=document.getElementById('progress');
  let file=null;
  setupDropZone(zone,input,inc=>{
    const pdf=inc.find(f=>f.type==='application/pdf'||f.name.toLowerCase().endsWith('.pdf'));
    if(!pdf)return setStatus(status,'Please select a PDF.','error');
    file=pdf;
    list.innerHTML=`<div class="file-item"><span>W</span><span class="name">${pdf.name}</span><span class="size">${formatBytes(pdf.size)}</span></div>`;
    runBtn.disabled=false;setStatus(status,'Ready.','info');
  });
  runBtn.addEventListener('click',async()=>{
    if(!file)return;
    runBtn.disabled=true;setStatus(status,'Extracting text and building document…','info');setProgress(progress,10);
    try{
      const buf=await file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:buf}).promise;
      const {Document,Packer,Paragraph,TextRun,PageBreak}=window.docx;
      const paragraphs=[];
      for(let i=1;i<=pdf.numPages;i++){
        const page=await pdf.getPage(i);
        const content=await page.getTextContent();
        let line='',lastY=null;
        content.items.forEach(it=>{
          const y=it.transform[5];
          if(lastY!==null&&Math.abs(y-lastY)>4){
            if(line.trim())paragraphs.push(new Paragraph({children:[new TextRun(line.trim())]}));
            line='';
          }
          line+=it.str+(it.hasEOL?'\n':' ');
          lastY=y;
        });
        if(line.trim())paragraphs.push(new Paragraph({children:[new TextRun(line.trim())]}));
        if(i<pdf.numPages)paragraphs.push(new Paragraph({children:[new PageBreak()]}));
        setProgress(progress,10+(i/pdf.numPages)*80);
      }
      const doc=new Document({sections:[{properties:{},children:paragraphs}]});
      const blob=await Packer.toBlob(doc);
      setProgress(progress,100);
      download(blob,file.name.replace(/\.pdf$/i,'')+'.docx');
      setStatus(status,'✓ Word document ready! Note: layout is simplified — fonts and images are not preserved.','success');
    }catch(err){console.error(err);setStatus(status,'Error: '+err.message,'error');}
    finally{runBtn.disabled=false;}
  });
})();
</script>
</body>
</html>
