<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merge PDF — Combine PDF Files Online Free | PDF Toolkit</title>
<meta name="description" content="Merge multiple PDF files into one online. Free, unlimited, and 100% private — files never leave your browser.">
<link rel="stylesheet" href="../css/style.css">
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
<main class="tool-page container">
  <a class="back-link" href="../index.html">← All tools</a>
  <div class="tool-header">
    <h1>Merge PDF Files</h1>
    <p>Combine any number of PDFs into a single document. Drag to reorder. Runs entirely in your browser.</p>
  </div>

  <div data-ad></div>

  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">⬒</div>
    <h2>Drop PDF files here</h2>
    <p>or click to browse — you can add several at once</p>
    <button class="btn" type="button">Select Files</button>
    <input type="file" id="fileInput" accept="application/pdf" multiple>
  </div>

  <div class="file-list" id="fileList"></div>
  <div class="status" id="status"></div>
  <div class="progress" id="progress"><div class="progress-bar"></div></div>

  <div class="actions">
    <button class="btn btn-success" id="mergeBtn" disabled>Merge &amp; Download</button>
    <button class="btn btn-secondary" id="clearBtn">Clear All</button>
  </div>

  <div data-ad></div>
</main>

<script src="../js/app.js"></script>
<script src="../js/tools/merge.js"></script>
</body>
</html>
