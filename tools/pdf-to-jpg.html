<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF to JPG — Convert PDF Pages to Images | PDF Toolkit</title>
<meta name="description" content="Convert each page of a PDF to a JPG image. Free online — no upload required.">
<link rel="stylesheet" href="../css/style.css">
<script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body>
<main class="tool-page container">
  <a class="back-link" href="../index.html">← All tools</a>
  <div class="tool-header">
    <h1>PDF to JPG</h1>
    <p>Convert each page of your PDF into a high-quality JPG image.</p>
  </div>

  <div data-ad></div>

  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">🖼</div>
    <h2>Drop a PDF here</h2>
    <p>or click to browse</p>
    <button class="btn" type="button">Select File</button>
    <input type="file" id="fileInput" accept="application/pdf">
  </div>

  <div class="file-list" id="fileList"></div>

  <div class="options" id="options" style="display:none">
    <div class="row">
      <div>
        <label>Quality</label>
        <select id="quality">
          <option value="0.7">Standard (smaller file)</option>
          <option value="0.9" selected>High</option>
          <option value="1.0">Maximum</option>
        </select>
      </div>
      <div>
        <label>Resolution</label>
        <select id="scale">
          <option value="1.5">Standard (150 DPI)</option>
          <option value="2" selected>High (200 DPI)</option>
          <option value="3">Very High (300 DPI)</option>
        </select>
      </div>
    </div>
  </div>

  <div class="status" id="status"></div>
  <div class="progress" id="progress"><div class="progress-bar"></div></div>

  <div class="actions">
    <button class="btn btn-success" id="runBtn" disabled>Convert &amp; Download ZIP</button>
  </div>

  <div data-ad></div>
</main>

<script src="../js/app.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';</script>
<script src="../js/tools/pdf-to-jpg.js"></script>
</body>
</html>
