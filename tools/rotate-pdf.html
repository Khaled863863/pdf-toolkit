<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotate PDF — Rotate All Pages Online | PDF Toolkit</title>
<meta name="description" content="Rotate all pages of a PDF 90°, 180° or 270°. Free and browser-based.">
<link rel="stylesheet" href="../css/style.css">
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
<main class="tool-page container">
  <a class="back-link" href="../index.html">← All tools</a>
  <div class="tool-header">
    <h1>Rotate PDF</h1>
    <p>Rotate every page of your PDF. Perfect for fixing scanned documents.</p>
  </div>

  <div data-ad></div>

  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">↻</div>
    <h2>Drop a PDF here</h2>
    <p>or click to select</p>
    <button class="btn" type="button">Select File</button>
    <input type="file" id="fileInput" accept="application/pdf">
  </div>

  <div class="file-list" id="fileList"></div>

  <div class="options" id="options" style="display:none">
    <div>
      <label>Rotation</label>
      <select id="deg">
        <option value="90">90° clockwise</option>
        <option value="180">180°</option>
        <option value="270">90° counter-clockwise</option>
      </select>
    </div>
  </div>

  <div class="status" id="status"></div>
  <div class="progress" id="progress"><div class="progress-bar"></div></div>

  <div class="actions">
    <button class="btn btn-success" id="runBtn" disabled>Rotate &amp; Download</button>
  </div>

  <div data-ad></div>
</main>

<script src="../js/app.js"></script>
<script>
(function(){
  const zone=document.getElementById('dropZone'),input=document.getElementById('fileInput'),
    list=document.getElementById('fileList'),options=document.getElementById('options'),
    deg=document.getElementById('deg'),runBtn=document.getElementById('runBtn'),
    status=document.getElementById('status'),progress=document.getElementById('progress');
  let file=null;
  setupDropZone(zone,input,inc=>{
    const pdf=inc.find(f=>f.type==='application/pdf'||f.name.toLowerCase().endsWith('.pdf'));
    if(!pdf)return setStatus(status,'Please select a PDF file.','error');
    file=pdf;
    list.innerHTML=`<div class="file-item"><span>↻</span><span class="name">${pdf.name}</span><span class="size">${formatBytes(pdf.size)}</span></div>`;
    options.style.display='';runBtn.disabled=false;
    setStatus(status,'Ready.','info');
  });
  runBtn.addEventListener('click',async()=>{
    if(!file)return;
    runBtn.disabled=true;setProgress(progress,20);setStatus(status,'Rotating…','info');
    try{
      const {PDFDocument,degrees}=PDFLib;
      const bytes=await file.arrayBuffer();
      const doc=await PDFDocument.load(bytes,{ignoreEncryption:true});
      const d=+deg.value;
      doc.getPages().forEach(p=>{
        const cur=p.getRotation().angle||0;
        p.setRotation(degrees((cur+d)%360));
      });
      const out=await doc.save();
      setProgress(progress,100);
      download(new Blob([out],{type:'application/pdf'}),file.name.replace(/\.pdf$/i,'')+'_rotated.pdf');
      setStatus(status,'✓ Done!','success');
    }catch(err){setStatus(status,'Error: '+err.message,'error');}
    finally{runBtn.disabled=false;}
  });
})();
</script>
</body>
</html>
