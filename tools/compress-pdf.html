<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compress PDF — Reduce PDF Size Online Free | PDF Toolkit</title>
<meta name="description" content="Compress PDF files to reduce their size while keeping quality. 100% free and private — your file stays in your browser.">
<link rel="stylesheet" href="../css/style.css">
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
</head>
<body>
<main class="tool-page container">
  <a class="back-link" href="../index.html">← All tools</a>
  <div class="tool-header">
    <h1>Compress PDF</h1>
    <p>Shrink your PDF by re-rendering pages as images at the chosen quality.</p>
  </div>

  <div data-ad></div>

  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">⇩</div>
    <h2>Drop a PDF here</h2>
    <p>or click to select a file</p>
    <button class="btn" type="button">Select File</button>
    <input type="file" id="fileInput" accept="application/pdf">
  </div>

  <div class="file-list" id="fileList"></div>

  <div class="options" id="options" style="display:none">
    <div>
      <label>Compression level</label>
      <select id="level">
        <option value="high">Low quality — smallest file</option>
        <option value="medium" selected>Medium quality — balanced (recommended)</option>
        <option value="low">High quality — larger file</option>
      </select>
    </div>
  </div>

  <div class="status" id="status"></div>
  <div class="progress" id="progress"><div class="progress-bar"></div></div>

  <div class="actions">
    <button class="btn btn-success" id="runBtn" disabled>Compress &amp; Download</button>
  </div>

  <div data-ad></div>
</main>

<script src="../js/app.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';</script>
<script src="../js/tools/compress.js"></script>
</body>
</html>
